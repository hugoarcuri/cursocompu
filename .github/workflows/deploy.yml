name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /cursocompu
          NEXT_PUBLIC_BASE_PATH: /cursocompu
          NEXT_PUBLIC_SUPABASE_URL: https://upliskvwkwpwarjajxpq.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwbGlza3Z3a3dwd2FyamFqeHBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMjA1MDcsImV4cCI6MjA5ODU5NjUwN30.Eu7JobwqJMSjenmWZvPfWOR54VNtPp-FLhiN-OOalF8
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
